{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <i class="bi bi-heart-pulse-fill text-primary" style="font-size:2.5rem"></i>
      <h3 class="fw-bold mt-2">MediNote AI</h3>
      <p class="text-muted">Create your account</p>
    </div>
    <div class="card p-4">
      <h5 class="fw-bold mb-3">Register</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full name</label>
          <input type="text" name="name" class="form-control" placeholder="Dr. Firstname Lastname" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="doctor@hospital.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-person-plus me-2"></i>Create account
        </button>
      </form>
      <hr/>
      <p class="text-center text-muted mb-0" style="font-size:0.9rem">
        Already registered? <a href="{{ url_for('auth.login') }}">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
